roles:
  designer:
    owns:
      - design/gdd/game.md
      - design/gdd/systems-index.md
      - design/gdd/*.md
      - design/content/*-data.md
  artist:
    owns:
      - design/art/art-direction.md
      - design/art/*-art.md
  planner:
    owns:
      - production/milestone.md

workflows:
  steps:
    - skill: /gat-brainstorm
      args: "[hint] or discuss"
      output:
        - design/gdd/game.md
        - design/gdd/systems-index.md
        - design/art/art-direction.md
    - skill: /gat-design
      args: "[system-name]"
      output:
        - design/gdd/<system>.md
        - design/content/<system>-data.md
        - design/art/<system>-art.md
    - skill: /gat-milestone
      output:
        - production/milestone.md
